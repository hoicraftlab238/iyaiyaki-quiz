    --light: #F8F9FA;
    --white: #FFFFFF;
    --correct: #2ECC71;

    border-radius: 50%;

  }

  }

  }

  @keyframes float2 {

    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;

    line-height: 1.3;
    color: var(--dark);
    margin-bottom: 8px;
  }

  .header h1 span {

  }

  .header p {

    color: var(--dark-soft);

  }

    background: white;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);

  .progress-text {

    font-weight: 700;
    color: var(--dark-soft);
  }

  .progress-score {

    font-weight: 700;
    color: var(--primary);
  }

  .progress-bar {
    height: 8px;
    background: #F0F0F0;
    border-radius: 100px;

  }

    height: 100%;

    box-shadow: var(--shadow);

  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }

    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--primary);
    margin-bottom: 12px;
    text-transform: uppercase;

  }

    font-weight: 900;
    color: white;

  }

  .result-total {
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    font-weight: 700;
  }

  .result-title {
    font-family: 'Zen Kaku Gothic New', sans-serif;

    color: var(--dark-soft);

  .result-breakdown {

    border-bottom: 1px solid #EEE;

  .breakdown-mark {

  .btn-retry {
    width: 100%;

    background: linear-gradient(135deg, var(--primary), #FF4757);

    border-radius: 100px;

    font-weight: 700;

  /* Brand footer */
  .brand-footer {
    text-align: center;
    padding: 16px 0 0;
    font-size: 12px;
    color: var(--dark-soft);

    font-weight: 700;

  .btn-batsu.selected { ring: 3px solid white; transform: scale(0.96); }
  .btn-maru.dimmed, .btn-batsu.dimmed { opacity: 0.4; }
</style>
</head>

// Shuffle array
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  const pct = score / total;
  if (pct === 1) return { emoji: '🏆', title: '満点！すごい！', msg: 'イヤイヤ期のことをよく理解されています。\nその知識を日々の関わりに活かしてみてください。' };
  if (pct >= 0.8) return { emoji: '⭐', title: 'とても良い理解です！', msg: '子どもの気持ちへの理解が深いですね。\n間違えた問題の解説も読んでみてください。' };
  if (pct >= 0.6) return { emoji: '👍', title: 'なかなかよくできました！', msg: 'イヤイヤ期の基本はおさえています。\n苦手な部分を確認してみましょう。' };
  return { emoji: '📚', title: 'もう一度チャレンジ！', msg: 'イヤイヤ期は奥が深いです。\n解説を読んで再チャレンジしてみてください。' };
}

function render() {
  const app = document.getElementById('app');

  if (state.screen === 'start') {
    app.innerHTML = `
      <div class="card start-screen">
        <span class="start-illust">😤</span>
        <div class="start-title">イヤイヤ期の「イヤ！」<br>どこまで知ってる？</div>
        <p class="start-desc">子どもの「イヤ！」には、ちゃんと理由があります。<br>全15問のクイズで、イヤイヤ期の本質を確認しましょう。</p>
        <div class="start-tags">
          <span class="tag">🧠 本質・心理 5問</span>
          <span class="tag">💡 関わり方 5問</span>
          <span class="tag">🌱 発達との関係 5問</span>
        </div>
        <button class="btn-start" onclick="startQuiz()">クイズをはじめる</button>
      </div>
    `;
  } else if (state.screen === 'quiz') {
    const q = state.questions[state.current];
    const progress = ((state.current) / state.questions.length) * 100;

    let feedbackHTML = '';
    if (state.answered) {
      const userAnswer = state.lastAnswer;
      const correct = userAnswer === q.answer;
      feedbackHTML = `
        <div class="feedback ${correct ? 'correct' : 'incorrect'}">
          <div class="feedback-header">
            <span class="feedback-icon">${correct ? '⭕' : '❌'}</span>
            <span class="feedback-label">${correct ? '正解！' : '不正解'}</span>
          </div>
          <div class="feedback-answer">答え：${q.answer ? '○（正しい）' : '×（誤り）'}</div>
          <div class="feedback-text">${q.explanation}</div>
        </div>
        <button class="btn-next" onclick="nextQuestion()">
          ${state.current + 1 < state.questions.length ? '次の問題へ →' : '結果を見る 🎉'}
        </button>
      `;
    }

    app.innerHTML = `
      <div class="progress-wrap">
        <div class="progress-info">
          <span class="progress-text">${state.current + 1} / ${state.questions.length}問</span>
          <span class="progress-score">✅ ${state.score}正解</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>
      <div class="card">
        <div class="question-num">Q${state.current + 1}｜${q.category}</div>
        <div class="question-text">${q.text}</div>
        <div class="btn-group">
          <button class="btn btn-maru ${state.answered && !q.answer ? 'dimmed' : ''} ${state.answered && q.answer ? 'selected' : ''}"
            onclick="answer(true)" ${state.answered ? 'disabled' : ''}>○</button>
          <button class="btn btn-batsu ${state.answered && q.answer ? 'dimmed' : ''} ${state.answered && !q.answer ? 'selected' : ''}"
            onclick="answer(false)" ${state.answered ? 'disabled' : ''}>×</button>
        </div>
        ${feedbackHTML}
      </div>
    `;
  } else if (state.screen === 'result') {
    const { emoji, title, msg } = getResultMessage(state.score, state.questions.length);
    const breakdownItems = state.results.map((r, i) => `
      <div class="breakdown-item">
        <span class="breakdown-mark">${r.correct ? '⭕' : '❌'}</span>
        <span class="breakdown-q">Q${i+1}. ${state.questions[i].text.substring(0, 28)}${state.questions[i].text.length > 28 ? '…' : ''}</span>
      </div>
    `).join('');

    app.innerHTML = `
      <div class="card result-screen">
        <div class="result-circle">
          <div class="result-score">${state.score}</div>
          <div class="result-total">/ ${state.questions.length}問正解</div>
        </div>
        <div class="result-title">${emoji} ${title}</div>
        <p class="result-message">${msg.replace(/\n/g, '<br>')}</p>
        <div class="result-breakdown">
          <div class="breakdown-title">問題別結果</div>
          ${breakdownItems}
        </div>
        <button class="btn-retry" onclick="startQuiz()">もう一度挑戦する 🔄</button>
        <button class="btn-retry" style="background: linear-gradient(135deg, var(--accent), #45B7AA);" onclick="resetToStart()">トップに戻る 🏠</button>
      </div>
    `;
  }
}

function startQuiz() {
  state = {
    screen: 'quiz',
    questions: shuffle(questions),
    current: 0,
    score: 0,
    answered: false,
    lastAnswer: null,
    results: []
  };
  render();
}

function answer(userAnswer) {
  if (state.answered) return;
  const q = state.questions[state.current];
  const correct = userAnswer === q.answer;
  state.answered = true;
  state.lastAnswer = userAnswer;
  if (correct) state.score++;
  state.results.push({ correct });
  render();
}

function nextQuestion() {
  state.current++;
  state.answered = false;
  state.lastAnswer = null;
  if (state.current >= state.questions.length) {
    state.screen = 'result';
  }
  render();
}

function resetToStart() {
  state.screen = 'start';
  render();
}

// Init
render();
</script>
</body>
</html>
